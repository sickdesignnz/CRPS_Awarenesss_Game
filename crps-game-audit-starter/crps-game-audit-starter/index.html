<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRPS Awareness Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0f1115; color: #eaeaea; }
      #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }
      header {
        display:flex; gap: 16px; align-items:center; padding: 12px 16px; border-bottom: 1px solid #2a2f3a;
        position: sticky; top: 0; background: rgba(15,17,21,0.9); backdrop-filter: blur(6px);
      }
      .meters { display:flex; gap: 12px; }
      .meter { display:flex; align-items:center; gap:8px; font: 14px/1.2 system-ui, sans-serif; }
      canvas { width: 100%; height: 100%; display: block; }
      .visually-hidden { position: absolute !important; clip: rect(1px, 1px, 1px, 1px); padding: 0; border: 0; height: 1px; width: 1px; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <strong>CRPS Awareness Game</strong>
        <div class="meters" aria-live="polite">
          <div class="meter" id="energyLabel">⚡ Energy: <span id="energyVal">0</span></div>
          <div class="meter" id="moodLabel">😊 Mood: <span id="moodVal">0</span></div>
          <div class="meter" id="flareLabel">🔥 Flare: <span id="flareVal">free</span></div>
        </div>
        <button id="drawBtn" style="margin-left:auto">Draw</button>
      </header>
      <canvas id="board" role="img" aria-label="Game board"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
